# main 分支每次推送：跑测试 → 打包 Hunk.app → 自动发布 GitHub Release
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26  # 需要 Xcode 26 SDK（ToolbarSpacer 等 API）
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整历史 + tag，用于生成两次 Release 之间的变更列表
          fetch-tags: true

      - name: 运行测试
        run: swift test

      - name: 导入签名证书（未配置 Secrets 时跳过，退回 ad-hoc）
        env:
          CERT_P12: ${{ secrets.HUNK_CERT_P12 }}
          CERT_PWD: ${{ secrets.HUNK_CERT_PWD }}
        run: |
          if [ -z "$CERT_P12" ]; then
            echo "未配置 HUNK_CERT_P12，使用 ad-hoc 签名"
            exit 0
          fi
          echo "$CERT_P12" | base64 -d > cert.p12
          # 独立钥匙串导入身份
          security create-keychain -p ci ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p ci ci.keychain
          security import cert.p12 -k ci.keychain -P "$CERT_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci ci.keychain
          # 自签证书需显式信任为代码签名，find-identity 才视为有效
          openssl pkcs12 -in cert.p12 -clcerts -nokeys -out cert.pem -passin pass:"$CERT_PWD" -legacy 2>/dev/null \
            || openssl pkcs12 -in cert.p12 -clcerts -nokeys -out cert.pem -passin pass:"$CERT_PWD"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain cert.pem
          # 从证书里取签名名字（CN），传给 make-app.sh（支持任意自定义名字）
          CN=$(openssl x509 -in cert.pem -noout -subject -nameopt multiline | awk -F'= ' '/commonName/{print $2}')
          echo "HUNK_SIGN_ID=$CN" >> "$GITHUB_ENV"
          echo "签名身份：$CN"
          rm -f cert.p12 cert.pem

      - name: 构建并打包
        env:
          HUNK_VERSION: 0.1.${{ github.run_number }}
          HUNK_BUILD: ${{ github.run_number }}
        run: |
          ./Scripts/make-app.sh release
          ditto -c -k --sequesterRsrc --keepParent dist/Hunk.app dist/Hunk.zip

      - name: 生成发布说明（汇总上次 Release 以来的提交）
        run: |
          PREV_TAG=$(git tag --list 'build-*' --sort=-v:refname | head -1)
          {
            echo "自动构建自 \`${GITHUB_SHA::8}\`"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "### 自 ${PREV_TAG} 以来的变更"
              echo
              git log "${PREV_TAG}..HEAD" --pretty=format:'- %s'
            else
              echo "### 变更"
              echo
              git log --pretty=format:'- %s' -30
            fi
            echo
            echo
            echo "> 下载 Hunk.zip，解压后拖入「应用程序」。"
            echo "> 包暂未经过 Apple 公证，首次打开若提示「已损坏，移到废纸篓」，执行："
            echo "> \`xattr -cr /Applications/Hunk.app\`"
          } > release-notes.md
          cat release-notes.md

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Hunk 0.1.${{ github.run_number }}
          body_path: release-notes.md
          files: dist/Hunk.zip
