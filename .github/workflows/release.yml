# main 分支每次推送：跑测试 → 打包 Hunk.app → 自动发布 GitHub Release
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26  # 需要 Xcode 26 SDK（ToolbarSpacer 等 API）
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整历史 + tag，用于生成两次 Release 之间的变更列表
          fetch-tags: true

      - name: 运行测试
        run: swift test

      - name: 构建并打包
        env:
          HUNK_VERSION: 0.1.${{ github.run_number }}
          HUNK_BUILD: ${{ github.run_number }}
        run: |
          ./Scripts/make-app.sh release
          ditto -c -k --sequesterRsrc --keepParent dist/Hunk.app dist/Hunk.zip

      - name: 生成发布说明（汇总上次 Release 以来的提交）
        run: |
          PREV_TAG=$(git tag --list 'build-*' --sort=-v:refname | head -1)
          {
            echo "自动构建自 \`${GITHUB_SHA::8}\`"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "### 自 ${PREV_TAG} 以来的变更"
              echo
              git log "${PREV_TAG}..HEAD" --pretty=format:'- %s'
            else
              echo "### 变更"
              echo
              git log --pretty=format:'- %s' -30
            fi
            echo
            echo
            echo "> 下载 Hunk.zip，解压后拖入「应用程序」。首次打开如被拦截："
            echo "> 右键 → 打开，或在「系统设置 → 隐私与安全性」中允许。"
          } > release-notes.md
          cat release-notes.md

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Hunk 0.1.${{ github.run_number }}
          body_path: release-notes.md
          files: dist/Hunk.zip
